<!DOCTYPE html>
<html>
<head>
<title>NutriCalc</title>
</head>

<body>
  
<p>Вес (кг):</p>
<input id="weight">

<p>Рост (см):</p>
<input id="height">

<button onclick="calculateBMI()">Рассчитать</button>

<p id="result"></p>
<script>
function calculateBMI() {
  let weight = Number(document.getElementById("weight").value);
  let height = Number(document.getElementById("height").value);

  height = height / 100;

  let bmi = weight / (height * height);

 let result = "";

if (bmi < 18.5) {
  result = "Недостаточный вес";
}
else if (bmi < 25) {
  result = "Нормальный вес";
}
else if (bmi < 30) {
  result = "Избыточный вес";
}
else if (bmi < 35) {
  result = "Ожирение I степени";
}
else if (bmi < 40) {
  result = "Ожирение II степени";
}
else {
  result = "Ожирение III степени (морбидное ожирение)";
}

document.getElementById("result").textContent =
  "Ваш ИМТ: " + bmi + " " + result;"Ваш ИМТ: " + bmi.toFixed(1) + ". " + result;
}
</script>

</body>
</html>
